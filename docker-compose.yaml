services:
    postgres:
      image: postgres:16-alpine
      container_name: order-postgres
      ports:
        - "5432:5432"
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: order_microservices
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres -d order_microservices"]
        interval: 5s
        timeout: 5s
        retries: 10
      volumes:
        - order_postgres_data:/var/lib/postgresql/data

    zookeeper:
      image: confluentinc/cp-zookeeper:7.4.0
      container_name: zookeeper
      ports:
        - "2181:2181"
      environment:
        ZOOKEEPER_CLIENT_PORT: 2181
        ZOOKEEPER_TICK_TIME: 2000

    kafka1:
      image: confluentinc/cp-kafka:7.4.0
      container_name: kafka1
      depends_on:
        - zookeeper
      ports:
        - "9092:9092"
        - "19092:19092"
      environment:
        KAFKA_BROKER_ID: 1
        KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
        KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka1:19092,PLAINTEXT_HOST://localhost:9092
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
        KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    jaeger:
      image: jaegertracing/all-in-one:latest
      ports:
        - "16686:16686"  # Jaeger UI
        - "14268:14268"  # HTTP endpoint for spans
        - "14250:14250"  # gRPC endpoint for spans
    api-gateway:
      image: c0dys/api_gateway_order:latest
      container_name: api-gateway
      ports:
        - "8080:8080"  # Внешний порт
      depends_on:
        - auth-service
        - inventory-service
    auth-service:
      image: c0dys/auth_order:latest
      container_name: auth-service
      expose:
        - "44044"
    inventory-service:
      image: c0dys/inventory_order:latest
      container_name: inventory-service
      expose:
        - "44045"

volumes:
    order_postgres_data:

